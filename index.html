<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAP Music Player</title>
    <style>
        :root {
            --bg-light: #f4f7f6;
            --header-green: #2d5a41; /* Matches LEAP Header */
            --primary-green: #1DB954;
            --card-blue: #e0f7f6;
            --card-pink: #fce4ec;
            --card-yellow: #fff9c4;
            --card-purple: #e8eaf6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-light);
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER AREA */
        header {
            background-color: var(--header-green);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: white;
            height: 100%;
            position: fixed;
            left: -310px; /* Hidden */
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }
        .sidebar.open { left: 0; }

        .sidebar-header {
            padding: 20px;
            background: var(--header-green);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-sidebar-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .side-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .side-item img { width: 25px; height: 25px; margin-right: 15px; border-radius: 4px; }
        .side-item:hover { background: #f9f9f9; color: var(--header-green); }

        /* MAIN AREA */
        .main-container {
            flex-grow: 1;
            margin-top: 70px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        /* ALBUM CARDS */
        .category-card {
            aspect-ratio: 1/1.1;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .category-card:active { transform: scale(0.96); }
        .category-card img { 
            width: 70px; 
            height: 70px; 
            margin-bottom: 15px; 
            object-fit: contain; 
        }
        .category-card b { font-size: 0.95rem; color: #333; line-height: 1.2; }

        /* CARD BACKGROUND COLORS */
        .c-1 { background-color: var(--card-blue); }
        .c-2 { background-color: var(--card-pink); }
        .c-3 { background-color: var(--card-yellow); }
        .c-4 { background-color: var(--card-purple); }

        /* PLAYER VIEW (BIG IMAGE) */
        #player-view { 
            display: none; 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            border-radius: 20px; 
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #player-view img.big-art { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 12px; 
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        audio { width: 100%; margin: 20px 0; filter: hue-rotate(90deg); }

        .song-row {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .song-row b { font-size: 0.9rem; }
        .song-row:hover { background: #fcfcfc; }
        .playing-now { color: var(--header-green); font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <div onclick="toggleSidebar()" style="cursor:pointer; font-size: 1.4rem;">☰</div>
        <div style="text-align: center;">
            <h2 style="font-size: 1rem;">LEAP</h2>
            <span style="font-size: 0.7rem; opacity: 0.8;">Music Excellence Hub</span>
        </div>
        <div onclick="showHome()" style="cursor:pointer; font-size: 1.4rem;">🏠</div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Playlists</span>
            <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <div id="side-pl-list">
            </div>
    </div>

    <div class="main-container">
        <div id="dashboard">
            <h3 style="color: var(--header-green); margin-bottom: 20px;">Governance Playlists</h3>
            <div class="grid-container" id="playlist-grid">
                </div>
        </div>

        <div id="player-view">
            <button onclick="showHome()" style="border:none; background:none; color:var(--header-green); cursor:pointer; margin-bottom:15px; font-weight:bold;">← Back</button>
            <img id="main-art" class="big-art" src="" alt="Cover">
            <h2 id="pl-display-name" style="margin: 15px 0 5px 0; font-size: 1.3rem;">Playlist Name</h2>
            <p id="song-info" style="color:#777; font-size: 0.85rem; margin-bottom: 20px;">Select a song</p>
            
            <audio id="audio-player" controls controlsList="nodownload"></audio>
            
            <div id="tracklist-container" style="margin-top: 20px;">
                </div>
        </div>
    </div>

<script>
    // --- DATA: Add your GitHub Image and MP3 URLs here ---
    const playlists = [
        {
            name: "IFA Tablet Distribution",
            cardImg: "https://raw.githubusercontent.com/nagarjunagalla/music/main/chaganti.jpeg", // Small icon for card
            albumArt: "https://raw.githubusercontent.com/nagarjunagalla/music/main/chaganti.jpeg", // Large cover for player
            color: "c-1",
            songs: [
                { title: "SLSN 1", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN1.mp3" },
                { title: "SLSN 2", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN2.mp3" },
                { title: "SLSN 3", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN3.mp3" },
                { title: "SLSN 4", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN4.mp3" },
                { title: "SLSN 5", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN5.mp3" },
                { title: "SLSN 6", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN6.mp3" },
                { title: "SLSN 7", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN7.mp3" },
                { title: "SLSN 8", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN8.mp3" },
                { title: "SLSN 9", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN9.mp3" },
                { title: "SLSN 10", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN10.mp3" },
                { title: "SLSN 11", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN11.mp3" },
                { title: "SLSN 12", artist: "CHAGANTI", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN12.mp3" },
            ]
        },
        {
            name: "LOVE SONGS",
            cardImg: "https://raw.githubusercontent.com/USER/REPO/main/check_icon.png",
            albumArt: "https://raw.githubusercontent.com/USER/REPO/main/check_big.jpg",
            color: "c-2",
            songs: [
                { title: "Quality Check", artist: "Inspector", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/song1.mp3" },
                { title: "Quality Check", artist: "Inspector", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/song2.mp3" },
                { title: "Quality Check", artist: "Inspector", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/song3.mp3" },
                { title: "Quality Check", artist: "Inspector", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/song4.mp3" },
                { title: "Quality Check", artist: "Inspector", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/song5.mp3" },
                { title: "Quality Check", artist: "Inspector", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/song6.mp3" }
        
            ]
        },
        {
            name: "Commodity Balances",
            cardImg: "https://raw.githubusercontent.com/USER/REPO/main/stock_icon.png",
            albumArt: "https://raw.githubusercontent.com/USER/REPO/main/stock_big.jpg",
            color: "c-3",
            songs: [
                { title: "Balance Flow", artist: "Stockist", url: "URL_4" }
            ]
        },
        {
            name: "Daily Feedback",
            cardImg: "https://raw.githubusercontent.com/USER/REPO/main/chat_icon.png",
            albumArt: "https://raw.githubusercontent.com/USER/REPO/main/chat_big.jpg",
            color: "c-4",
            songs: [
                { title: "Citizen Voices", artist: "Feedback Lo-Fi", url: "URL_5" }
            ]
        }
    ];

    const sidebar = document.getElementById('sidebar');
    const audio = document.getElementById('audio-player');
    let currentPlaylist = null;
    let trackIndex = 0;

    function init() {
        const grid = document.getElementById('playlist-grid');
        const sideList = document.getElementById('side-pl-list');

        playlists.forEach((pl, i) => {
            // 1. Dashboard Card
            const card = document.createElement('div');
            card.className = `category-card ${pl.color}`;
            card.innerHTML = `<img src="${pl.cardImg}"><b>${pl.name}</b>`;
            card.onclick = () => openPlaylist(i);
            grid.appendChild(card);

            // 2. Sidebar Item
            const item = document.createElement('div');
            item.className = 'side-item';
            item.innerHTML = `<img src="${pl.cardImg}"><span>${pl.name}</span>`;
            item.onclick = () => { openPlaylist(i); toggleSidebar(); };
            sideList.appendChild(item);
        });
    }

    function toggleSidebar() {
        sidebar.classList.toggle('open');
    }

    function openPlaylist(idx) {
        currentPlaylist = playlists[idx];
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('player-view').style.display = 'block';
        
        document.getElementById('main-art').src = currentPlaylist.albumArt;
        document.getElementById('pl-display-name').innerText = currentPlaylist.name;
        
        renderTracks();
    }

    function renderTracks() {
        const container = document.getElementById('tracklist-container');
        container.innerHTML = '';
        currentPlaylist.songs.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'song-row';
            row.id = `t-${i}`;
            row.innerHTML = `<b>${s.title}</b><small>${s.artist}</small>`;
            row.onclick = () => playSong(i);
            container.appendChild(row);
        });
    }

    function playSong(idx) {
        trackIndex = idx;
        const song = currentPlaylist.songs[idx];
        audio.src = song.url;
        document.getElementById('song-info').innerText = `${song.title} — ${song.artist}`;
        
        document.querySelectorAll('.song-row').forEach(el => el.classList.remove('playing-now'));
        document.getElementById(`t-${idx}`).classList.add('playing-now');
        
        audio.play();
    }

    function showHome() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('player-view').style.display = 'none';
    }

    audio.onended = () => {
        let next = (trackIndex + 1) % currentPlaylist.songs.length;
        playSong(next);
    };

    init();
</script>
</body>
</html>
