<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Music Explorer</title>
    <style>
        :root {
            --bg: #000000;
            --card: #181818;
            --primary: #1DB954;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: #121212;
            border-radius: 15px;
            overflow: hidden;
            min-height: 80vh;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Views */
        .view { padding: 20px; transition: 0.3s; }
        .hidden { display: none; }

        header h1 { font-size: 1.5rem; margin-bottom: 20px; }

        /* Playlist Grid */
        .playlist-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .playlist-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .playlist-card:hover { background: #282828; }

        .playlist-card img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        /* Tracklist View */
        .back-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .track-item:hover { background: #282828; }
        .track-item b { display: block; font-size: 0.9rem; }
        .track-item span { font-size: 0.8rem; color: var(--text-dim); }

        /* Sticky Player Bar */
        .now-playing-bar {
            position: sticky;
            bottom: 0;
            background: #181818;
            border-top: 2px solid var(--primary);
            padding: 15px;
            display: none; /* Only shows when a song starts */
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(1);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="library-view" class="view">
        <header><h1>Your Playlists</h1></header>
        <div class="playlist-grid" id="playlist-grid">
            </div>
    </div>

    <div id="track-view" class="view hidden">
        <button class="back-btn" onclick="showLibrary()">← Back to Library</button>
        <h2 id="current-playlist-name">Playlist Name</h2>
        <div id="track-list">
            </div>
    </div>

    <div class="now-playing-bar" id="player-bar">
        <div style="font-size: 0.85rem;">
            <b id="playing-title">Song Title</b><br>
            <span id="playing-artist" style="color:#b3b3b3">Artist</span>
        </div>
        <audio id="audio-player" controls controlsList="nodownload"></audio>
    </div>
</div>

<script>
    // --- DATABASE: Add your GitHub Raw URLs here ---
    const data = [
        {
            id: 0,
            title: "శ్రీ లలితా సహస్రనామం",
            cover: "https://raw.githubusercontent.com/nagarjunagalla/music/main/chaganti.jpeg", // Replace with GitHub Image URL
            songs: [
                { name: "Coffee Morning", artist: "Beats by GH", url: "https://raw.githubusercontent.com/nagarjunagalla/music/main/SLSN1.mp3" },
                { name: "Rainy Window", artist: "Sleepy Cat", url: "URL_HERE" }
            ]
        },
        {
            id: 1,
            title: "Workout Mix",
            cover: "https://picsum.photos/id/2/200", 
            songs: [
                { name: "Power Up", artist: "Gym Rat", url: "URL_HERE" },
                { name: "Fast Lane", artist: "Runner 101", url: "URL_HERE" }
            ]
        }
    ];

    const libraryView = document.getElementById('library-view');
    const trackView = document.getElementById('track-view');
    const playerBar = document.getElementById('player-bar');
    const audio = document.getElementById('audio-player');

    // Render the Playlists
    function renderLibrary() {
        const grid = document.getElementById('playlist-grid');
        data.forEach(pl => {
            const card = document.createElement('div');
            card.className = 'playlist-card';
            card.innerHTML = `
                <img src="${pl.cover}">
                <b>${pl.title}</b>
            `;
            card.onclick = () => showTracks(pl.id);
            grid.appendChild(card);
        });
    }

    function showTracks(playlistId) {
        const pl = data[playlistId];
        document.getElementById('current-playlist-name').innerText = pl.title;
        const listContainer = document.getElementById('track-list');
        listContainer.innerHTML = ''; // Clear old tracks

        pl.songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'track-item';
            item.innerHTML = `
                <div style="margin-right:15px; color:#1DB954">${index + 1}</div>
                <div>
                    <b>${song.name}</b>
                    <span>${song.artist}</span>
                </div>
            `;
            item.onclick = () => playSong(song, pl.songs, index);
            listContainer.appendChild(item);
        });

        libraryView.classList.add('hidden');
        trackView.classList.remove('hidden');
    }

    function showLibrary() {
        trackView.classList.add('hidden');
        libraryView.classList.remove('hidden');
    }

    let currentPlaylistSongs = [];
    let currentSongIndex = 0;

    function playSong(song, playlistSongs, index) {
        currentPlaylistSongs = playlistSongs;
        currentSongIndex = index;

        audio.src = song.url;
        document.getElementById('playing-title').innerText = song.name;
        document.getElementById('playing-artist').innerText = song.artist;
        
        playerBar.style.display = 'block';
        audio.play();
    }

    // Continuous Playback within the selected playlist
    audio.onended = () => {
        currentSongIndex++;
        if (currentSongIndex < currentPlaylistSongs.length) {
            playSong(currentPlaylistSongs[currentSongIndex], currentPlaylistSongs, currentSongIndex);
        } else {
            // Loop back to start of playlist or stop
            playSong(currentPlaylistSongs[0], currentPlaylistSongs, 0);
        }
    };

    renderLibrary();
</script>

</body>
</html>
